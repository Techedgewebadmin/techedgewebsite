<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Techedge Invoice Builder</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#e9edf2;
}

header{
  background:#0a5c3b;
  color:white;
  padding:10px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}

header .left-head{ display:flex; align-items:center; gap:14px; flex-wrap:wrap; }

.doc-toggle{
  display:flex;
  background:rgba(255,255,255,0.15);
  border-radius:6px;
  overflow:hidden;
}
.doc-toggle button{
  padding:6px 16px;
  border:none;
  background:transparent;
  color:white;
  font-weight:bold;
  font-size:13px;
  cursor:pointer;
  transition:background 0.2s;
}
.doc-toggle button.active{
  background:white;
  color:#0a5c3b;
}

.tax-toggle{
  display:flex;
  background:rgba(255,255,255,0.15);
  border-radius:6px;
  overflow:hidden;
}
.tax-toggle button{
  padding:6px 14px;
  border:none;
  background:transparent;
  color:white;
  font-size:12px;
  font-weight:bold;
  cursor:pointer;
  transition:background 0.2s;
}
.tax-toggle button.active{
  background:white;
  color:#0a5c3b;
}

.save-btn{
  padding:8px 16px;
  cursor:pointer;
  border:none;
  background:white;
  color:#0a5c3b;
  font-weight:bold;
  border-radius:4px;
}

.container{
  display:flex;
  min-height:calc(100vh - 56px);
}

/* LEFT PANEL */
.left{
  width:36%;
  min-width:300px;
  background:#f9fafb;
  padding:16px 18px;
  overflow:auto;
  font-size:13px;
}

.left h3{
  margin:14px 0 6px;
  font-size:12px;
  text-transform:uppercase;
  color:#0a5c3b;
  letter-spacing:0.05em;
  border-bottom:1px solid #ddd;
  padding-bottom:4px;
}

.left input, .left select, .left textarea{
  width:100%;
  padding:7px 9px;
  margin-bottom:7px;
  border:1px solid #ccc;
  border-radius:4px;
  font-size:13px;
}

.left textarea{ resize:vertical; }

.row2{ display:flex; gap:8px; }
.row2 > *{ flex:1; }

/* Same-as-billing checkbox */
.same-billing{
  display:flex;
  align-items:center;
  gap:6px;
  margin-bottom:8px;
  font-size:13px;
}

/* Line items */
#itemsTable{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
  margin-bottom:8px;
}
#itemsTable th{
  background:#e8f5ee;
  padding:5px 4px;
  text-align:left;
  font-weight:bold;
  white-space:nowrap;
}
#itemsTable td{
  padding:3px 2px;
  vertical-align:top;
}
#itemsTable input, #itemsTable select{
  padding:5px 4px;
  border:1px solid #ccc;
  border-radius:3px;
  font-size:12px;
  width:100%;
  margin-bottom:0;
}
#itemsTable .del-btn{
  background:#fee2e2;
  color:#b91c1c;
  border:none;
  border-radius:3px;
  padding:4px 7px;
  cursor:pointer;
  font-size:12px;
  width:100%;
}
.add-item-btn{
  background:#0a5c3b;
  color:white;
  border:none;
  padding:7px 14px;
  border-radius:4px;
  cursor:pointer;
  font-size:13px;
  margin-bottom:10px;
}

/* RIGHT PANEL */
.right{
  flex:1;
  background:#e9edf2;
  padding:24px 0;
  display:flex;
  justify-content:center;
  overflow:auto;
}

/* A4 DOCUMENT */
.document{
  width:210mm;
  min-height:297mm;
  background:white;
  padding:10mm 12mm;
  box-shadow:0 0 10px rgba(0,0,0,0.12);
  position:relative;
  font-size:12px;
  color:#111;
}

.watermark{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) rotate(-25deg);
  opacity:0.04;
  width:65%;
  pointer-events:none;
  z-index:0;
}

#preview{
  position:relative;
  z-index:1;
}

/* INVOICE DOC STYLES */
.inv-header{
  text-align:center;
  margin-bottom:8px;
}
.inv-header img.logo{
  height:60px;
}
.inv-header .doc-type{
  font-size:15px;
  font-weight:bold;
  margin:4px 0 2px;
}
.inv-header .company-name{
  font-size:13px;
  font-weight:bold;
}
.inv-header .company-sub{
  font-size:11px;
  color:#333;
  line-height:1.5;
}

.inv-addr-row{
  display:table;
  width:100%;
  border-collapse:collapse;
  border:1px solid #ccc;
  margin-bottom:6px;
}
.inv-addr-row > div{
  display:table-cell;
  padding:7px 9px;
  vertical-align:top;
  font-size:11px;
  line-height:1.5;
}
.inv-addr-row > div:not(:last-child){
  border-right:1px solid #ccc;
}
.addr-label{
  font-weight:bold;
  font-size:10px;
  text-transform:uppercase;
  color:#555;
  margin-bottom:3px;
}

.inv-table{
  width:100%;
  border-collapse:collapse;
  margin-bottom:0;
}
.inv-table th, .inv-table td{
  border:1px solid #ccc;
  padding:6px 7px;
  font-size:11px;
  vertical-align:top;
}
.inv-table th{
  background:#f2f2f2;
  font-weight:bold;
  text-align:center;
}
.inv-table td.num{ text-align:right; white-space:nowrap; }
.inv-table td.center{ text-align:center; }
.inv-table tr.notes-row td{
  background:#fafafa;
  font-size:10.5px;
  color:#444;
  font-style:italic;
}
.inv-table tr.subtotal-row td{
  font-weight:bold;
  background:#f9f9f9;
}
.inv-table tr.gst-row td{
  font-size:11px;
}
.inv-table tr.total-row td{
  font-weight:bold;
  font-size:12px;
  background:#e8f5ee;
}

.inv-footer-row{
  display:flex;
  justify-content:space-between;
  align-items:stretch;
  margin-top:10px;
  gap:10px;
}
.inv-sign-box{
  flex:1.2;
  font-size:11px;
  position:relative;
  min-width:150px;
  overflow:hidden;
  border:1px solid #ccc;
  padding:10px 12px;
}
.inv-customer-sign{
  flex:1.4;
  border:1px solid #ccc;
  padding:10px 12px;
  font-size:11px;
  min-height:80px;
  min-width:140px;
}

.inv-words{
  font-size:11px;
  border:1px solid #ccc;
  padding:6px 9px;
  margin-top:6px;
  background:#fafafa;
}
.inv-payment-terms{
  font-size:11px;
  margin-top:5px;
}

.inv-doc-footer{
  text-align:center;
  font-size:10px;
  color:#555;
  margin-top:14px;
  border-top:1px solid #eee;
  padding-top:6px;
}

/* Mobile */
@media(max-width:1000px){
  .container{ flex-direction:column; }
  .left{ width:100%; min-width:0; }
  .document{ width:100%; padding:14px; }
}

/* PRINT */
@page{ size:A4; margin:5mm; }

@media print{
  header,.left{ display:none !important; }
  body{ background:white; }
  .right{ padding:0; }
  .document{ box-shadow:none; width:100%; min-height:auto; padding:4mm; }
  .watermark{ opacity:0.04; }

  .inv-addr-row > div{ display:table-cell !important; }
  .inv-footer-row{ display:flex !important; }
}

</style>
</head>
<body>

<header>
  <div class="left-head">
    <b style="font-size:15px;">Techedge Invoice Builder</b>

    <!-- Invoice / PI toggle -->
    <div class="doc-toggle">
      <button id="btnInvoice" class="active" onclick="setDocType('invoice')">Invoice</button>
      <button id="btnPI" onclick="setDocType('pi')">Proforma Invoice</button>
    </div>

    <!-- Tax toggle -->
    <div class="tax-toggle">
      <button id="btnIGST" class="active" onclick="setTaxMode('igst')">IGST</button>
      <button id="btnCGST" onclick="setTaxMode('cgst')">CGST + SGST</button>
    </div>
  </div>

  <button class="save-btn" onclick="downloadPDF()">⬇ Save as PDF</button>
</header>

<div class="container">

<!-- LEFT PANEL -->
<div class="left">

  <h3>Invoice Details</h3>
  <div class="row2">
    <input id="invNo" placeholder="Invoice Number e.g. 2627100005">
    <input id="invDate" type="date">
  </div>

  <h3>Billing Address</h3>
  <input id="billName" placeholder="Company / Party Name">
  <textarea id="billAddr" rows="3" placeholder="Full Address"></textarea>
  <input id="billGSTIN" placeholder="GSTIN (optional)">

  <h3>Delivery Address</h3>
  <label class="same-billing">
    <input type="checkbox" id="sameAsBilling" onchange="toggleDelivery()"> Same as Billing
  </label>
  <div id="deliveryFields">
    <input id="delName" placeholder="Company / Party Name">
    <textarea id="delAddr" rows="3" placeholder="Full Address"></textarea>
    <input id="delGSTIN" placeholder="GSTIN (optional)">
  </div>

  <h3>PO Reference</h3>
  <div class="row2">
    <input id="poNo" placeholder="PO Number">
    <input id="poDate" type="date" title="PO Date">
  </div>

  <h3>Line Items</h3>
  <table id="itemsTable">
    <thead>
      <tr>
        <th style="width:34%">Description</th>
        <th style="width:13%">HSN</th>
        <th style="width:7%">Qty</th>
        <th style="width:10%">Unit</th>
        <th style="width:14%">Rate</th>
        <th style="width:10%">GST%</th>
        <th style="width:7%">Del</th>
      </tr>
    </thead>
    <tbody id="itemsBody"></tbody>
  </table>
  <button class="add-item-btn" onclick="addItem()">+ Add Row</button>

  <h3>Notes / PO Remarks</h3>
  <textarea id="notes" rows="2" placeholder="e.g. PO Number : 4800000090 Dated 27-03-2026 & Price revised confirmation mail from Shameer Pasha Dated 21-04-2026"></textarea>

  <h3>Payment Terms</h3>
  <textarea id="paymentTerms" rows="2">100% Payment before despatch</textarea>

</div>

<!-- RIGHT PANEL (A4 preview) -->
<div class="right">
  <div class="document">
    <img src="/Logo.png" class="watermark">
    <div id="preview"></div>
  </div>
</div>

</div>

<script>

/* ── State ── */
let docType = 'invoice';   // 'invoice' | 'pi'
let taxMode = 'igst';      // 'igst'   | 'cgst'

/* ── Toggles ── */
function setDocType(t){
  docType = t;
  document.getElementById('btnInvoice').classList.toggle('active', t==='invoice');
  document.getElementById('btnPI').classList.toggle('active', t==='pi');
  updatePreview();
}

function setTaxMode(m){
  taxMode = m;
  document.getElementById('btnIGST').classList.toggle('active', m==='igst');
  document.getElementById('btnCGST').classList.toggle('active', m==='cgst');
  updatePreview();
}

function toggleDelivery(){
  const same = document.getElementById('sameAsBilling').checked;
  document.getElementById('deliveryFields').style.display = same ? 'none' : 'block';
  updatePreview();
}

/* ── Line items ── */
let itemId = 0;
function addItem(){
  itemId++;
  const tr = document.createElement('tr');
  tr.id = 'item-' + itemId;
  tr.innerHTML = `
    <td><input type="text" placeholder="Description" onchange="updatePreview()" oninput="updatePreview()"></td>
    <td><input type="text" placeholder="HSN" onchange="updatePreview()" oninput="updatePreview()"></td>
    <td><input type="number" placeholder="1" min="0" onchange="updatePreview()" oninput="updatePreview()"></td>
    <td>
      <select onchange="updatePreview()">
        <option>Nos</option><option>Sets</option><option>Kgs</option>
        <option>Ltrs</option><option>No</option><option>Mtr</option><option>Sqft</option>
      </select>
    </td>
    <td><input type="number" placeholder="0.00" min="0" onchange="updatePreview()" oninput="updatePreview()"></td>
    <td>
      <select onchange="updatePreview()">
        <option value="5">5%</option>
        <option value="12">12%</option>
        <option value="18" selected>18%</option>
        <option value="28">28%</option>
        <option value="0">0%</option>
      </select>
    </td>
    <td><button class="del-btn" onclick="removeItem(${itemId})">✕</button></td>
  `;
  document.getElementById('itemsBody').appendChild(tr);
  updatePreview();
}

function removeItem(id){
  const el = document.getElementById('item-' + id);
  if(el) el.remove();
  updatePreview();
}

function getItems(){
  const rows = document.querySelectorAll('#itemsBody tr');
  return Array.from(rows).map(tr => {
    const inputs = tr.querySelectorAll('input, select');
    return {
      desc: inputs[0].value.trim(),
      hsn:  inputs[1].value.trim(),
      qty:  parseFloat(inputs[2].value) || 0,
      unit: inputs[3].value,
      rate: parseFloat(inputs[4].value) || 0,
      gst:  parseFloat(inputs[5].value) || 0,
    };
  }).filter(i => i.desc || i.rate > 0);
}

/* ── Helpers ── */
function fmtINR(n){
  n = Math.round(n * 100) / 100;
  return n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatDate(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr);
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getFullYear()).slice(-2);
}

function numberToWords(num){
  num = Math.round(num);
  if(num === 0) return 'Zero';
  const ones = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine',
    'Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  const tens = ['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function convert(n){
    let s = '';
    if(n > 99){ s += ones[Math.floor(n/100)] + ' Hundred '; n %= 100; }
    if(n > 19){ s += tens[Math.floor(n/10)] + ' '; n %= 10; }
    if(n > 0) s += ones[n] + ' ';
    return s;
  }
  let r = '';
  const cr = Math.floor(num/10000000); num %= 10000000;
  const la = Math.floor(num/100000);   num %= 100000;
  const th = Math.floor(num/1000);     num %= 1000;
  if(cr) r += convert(cr) + 'Crore ';
  if(la) r += convert(la) + 'Lakh ';
  if(th) r += convert(th) + 'Thousand ';
  if(num) r += convert(num);
  return r.trim() + ' Rupees Only';
}

/* ── Build GST summary from items ── */
function buildGSTSummary(items){
  // Group taxable amounts by gst rate
  const groups = {};
  items.forEach(it => {
    const amt = it.qty * it.rate;
    if(!groups[it.gst]) groups[it.gst] = 0;
    groups[it.gst] += amt;
  });

  const taxable = items.reduce((s, it) => s + it.qty * it.rate, 0);
  let totalTax = 0;
  let rows = '';

  const rates = Object.keys(groups).map(Number).sort((a,b) => a-b);

  rates.forEach(rate => {
    const base = groups[rate];
    const tax = base * rate / 100;
    totalTax += tax;
    if(taxMode === 'igst'){
      rows += `<tr class="gst-row"><td colspan="4" style="text-align:left;">ADD IGST ${rate}%</td><td class="num">${rate}.0%</td><td class="num">${fmtINR(tax)}</td></tr>`;
    } else {
      const half = tax / 2;
      rows += `<tr class="gst-row"><td colspan="4" style="text-align:left;">ADD CGST ${rate/2}%</td><td class="num">${(rate/2).toFixed(1)}%</td><td class="num">${fmtINR(half)}</td></tr>`;
      rows += `<tr class="gst-row"><td colspan="4" style="text-align:left;">ADD SGST ${rate/2}%</td><td class="num">${(rate/2).toFixed(1)}%</td><td class="num">${fmtINR(half)}</td></tr>`;
    }
  });

  return { taxable, totalTax, rows };
}

/* ── Main preview renderer ── */
function updatePreview(){
  const items = getItems();

  const invNo    = document.getElementById('invNo').value.trim();
  const invDate  = document.getElementById('invDate').value;
  const billName = document.getElementById('billName').value.trim();
  const billAddr = document.getElementById('billAddr').value.trim();
  const billGSTIN= document.getElementById('billGSTIN').value.trim();
  const same     = document.getElementById('sameAsBilling').checked;
  const delName  = same ? billName : document.getElementById('delName').value.trim();
  const delAddr  = same ? billAddr : document.getElementById('delAddr').value.trim();
  const delGSTIN = same ? billGSTIN: document.getElementById('delGSTIN').value.trim();
  const poNo     = document.getElementById('poNo').value.trim();
  const poDate   = document.getElementById('poDate').value;
  const notes    = document.getElementById('notes').value.trim();
  const payTerms = document.getElementById('paymentTerms').value.trim();

  const docLabel = docType === 'pi' ? 'Proforma Invoice' : 'Invoice';

  /* Line items rows */
  let itemRows = '';
  if(items.length === 0){
    itemRows = `<tr><td colspan="6" style="text-align:center;color:#aaa;font-style:italic;">No items added yet</td></tr>`;
  } else {
    items.forEach(it => {
      const amt = it.qty * it.rate;
      itemRows += `
        <tr>
          <td>${it.desc}</td>
          <td class="center">${it.hsn}</td>
          <td class="center">${it.qty}</td>
          <td class="center">${it.unit}</td>
          <td class="num">${fmtINR(it.rate)}</td>
          <td class="num">${fmtINR(amt)}</td>
        </tr>`;
    });
  }

  /* Notes / PO reference row */
  let notesRow = '';
  if(notes){
    notesRow = `<tr class="notes-row"><td colspan="6">${notes.replace(/\n/g,'<br>')}</td></tr>`;
  }

  /* PO reference line in header if present */
  let poRefLine = '';
  if(poNo){
    poRefLine = `PO No: <b>${poNo}</b>${poDate ? ' &nbsp;Dated ' + formatDate(poDate) : ''}`;
  }

  /* GST */
  const gst = buildGSTSummary(items);
  const grandTotal = gst.taxable + gst.totalTax;

  const amtWords = grandTotal > 0 ? numberToWords(grandTotal) : '';

  document.getElementById('preview').innerHTML = `

  <!-- Header -->
  <div class="inv-header">
    <img src="/Logo.png" class="logo">
    <div class="doc-type">${docLabel}</div>
    <div class="company-name">Techedge SPE India Pvt. Ltd.</div>
    <div class="company-sub">
      No. 10/11, Maragondanahalli Tavarekere, Bangalore-562130, Karnataka<br>
      Email : info@techedgeindia.co.in &nbsp;|&nbsp; GSTIN: 29AAHCT2953M1ZP
    </div>
  </div>

  <!-- Address + Invoice number row -->
  <div class="inv-addr-row">
    <div style="width:40%">
      <div class="addr-label">Billing Address</div>
      <b>${billName || '—'}</b><br>
      ${billAddr.replace(/\n/g,'<br>')}
      ${billGSTIN ? '<br>GSTIN:- ' + billGSTIN : ''}
    </div>
    <div style="width:38%">
      <div class="addr-label">Delivery Address</div>
      <b>${delName || '—'}</b><br>
      ${delAddr.replace(/\n/g,'<br>')}
      ${delGSTIN ? '<br>GSTIN:- ' + delGSTIN : ''}
    </div>
    <div style="width:12%; text-align:center;">
      <div class="addr-label">${docLabel} Number</div>
      <b>${invNo || '—'}</b>
      ${poRefLine ? '<br><br><div style="font-size:10px;color:#555;">' + poRefLine + '</div>' : ''}
    </div>
    <div style="width:10%; text-align:center;">
      <div class="addr-label">${docLabel} Date</div>
      <b>${formatDate(invDate) || '—'}</b>
    </div>
  </div>

  <!-- Items table -->
  <table class="inv-table">
    <thead>
      <tr>
        <th style="width:38%; text-align:left;">Description of Goods</th>
        <th style="width:13%">HSN CODE</th>
        <th style="width:7%">QTY</th>
        <th style="width:8%">Units</th>
        <th style="width:14%">RATE (INR)</th>
        <th style="width:14%">Amount (INR)</th>
      </tr>
    </thead>
    <tbody>
      ${itemRows}
      ${notesRow}
      <!-- Spacer rows to fill space -->
      <tr style="height:14px;"><td colspan="6"></td></tr>
      <tr class="subtotal-row">
        <td colspan="4" style="text-align:left;">Taxable Value (INR)</td>
        <td></td>
        <td class="num">${items.length ? fmtINR(gst.taxable) : ''}</td>
      </tr>
      <tr style="height:10px;"><td colspan="6"></td></tr>
      ${gst.rows}
      <tr class="total-row">
        <td colspan="5" style="text-align:right;"><b>Invoice Total (INR)</b></td>
        <td class="num"><b>${items.length ? fmtINR(grandTotal) : ''}</b></td>
      </tr>
    </tbody>
  </table>

  <!-- Amount in words -->
  ${amtWords ? `<div class="inv-words"><b>Amount in words :</b> (INR) Rupees ${amtWords}</div>` : ''}

  <!-- Payment terms + bank row (full width, above signatures) -->
  <div style="border:1px solid #ccc; padding:7px 10px; font-size:11px; margin-top:8px;">
    <b>Payment Terms :</b> ${payTerms.replace(/\n/g,'<br>')} &nbsp;&nbsp;
    <b>Bank Details:</b> State Bank of India, A/C No. 38440022567, IFSC SBIN0017780
  </div>

  <!-- Signature row -->
  <div class="inv-footer-row">

    <!-- Techedge signature -->
    <div class="inv-sign-box">
      <img src="/Logo.png" style="position:absolute;left:0;top:0;height:80px;opacity:0.05;z-index:0;pointer-events:none;">
      <div style="position:relative;z-index:1;">
        <b>For Techedge SPE India Pvt. Ltd.</b><br><br>
        <img src="/Sign.png" style="height:48px;"><br>
        <div style="border-top:1px solid #555;width:150px;margin-top:3px;"></div>
        <span>Authorised Signatory</span>
      </div>
    </div>

    <!-- Customer signature -->
    <div class="inv-customer-sign">
      <div style="font-size:10px;color:#555;">I hereby confirm that I have received the materials against this invoice in good condition, and I agree to the above terms and conditions.</div>
      <br><br>

  <div class="inv-doc-footer">

  `;
}

/* ── PDF save ── */
function downloadPDF(){
  const invNo = document.getElementById('invNo').value.trim() || 'Invoice';
  const billName = document.getElementById('billName').value.trim() || 'Client';
  const label = docType === 'pi' ? 'PI' : 'Invoice';
  const today = new Date();
  const dd = String(today.getDate()).padStart(2,'0');
  const mm = String(today.getMonth()+1).padStart(2,'0');
  const yy = today.getFullYear();
  document.title = `${label}_${billName.replace(/\s+/g,'-')}_${invNo}_${dd}${mm}${yy}`;
  window.print();
}

document.querySelectorAll('.left input, .left textarea, .left select').forEach(el => {
  el.addEventListener('input', updatePreview);
  el.addEventListener('change', updatePreview);
});
