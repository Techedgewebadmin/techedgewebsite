[build]
  command = "astro build"
  publish = "dist"

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap-index.xml"
  status = 301


[build.environment]
  NODE_VERSION = "22"

[[forms]]
  name = "solar-calculator"

[forms.notifications.solar-calculator]
  type = "email"
  to = "sales@techedgeindia.co.in"
  subject = "New Solar ROI Lead — {{name}} ({{system-kwp}} kWp, {{city}})"
