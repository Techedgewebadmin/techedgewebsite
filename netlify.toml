[build]
  command = "astro build"
  publish = "dist"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "22"

[[forms]]
  name = "solar-calculator"

[forms.notifications.solar-calculator]
  type = "email"
  to = "sales@techedgeindia.co.in"
  subject = "New Solar ROI Lead — {{name}} ({{system-kwp}} kWp, {{city}})"
